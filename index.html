    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Impact', 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            line-height: 1.3;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== GLOBAL ===== */
        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }
        a:hover {
            border-bottom-color: #ff3b00;
        }

        img, svg {
            display: block;
            max-width: 100%;
        }

        .container {
            padding: 72px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            line-height: 0.9;
        }

        h2 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            border-bottom: 4px solid #ff3b00;
            display: inline-block;
            padding-bottom: 12px;
            margin-bottom: 48px;
            transform: rotate(-0.5deg);
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        p {
            font-family: 'system-ui', sans-serif;
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            max-width: 65ch;
            color: #cccccc;
        }

        .accent-text {
            color: #ff3b00;
            font-weight: 700;
        }

        /* ===== HEADER / NAV ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 24px 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-transform: uppercase;
            border-bottom: none;
        }
        .logo:hover {
            border-bottom: none;
        }
        .logo span {
            color: #ff3b00;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 36px;
        }

        nav a {
            font-size: 1.2rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ffffff;
            border-bottom: 3px solid transparent;
            padding-bottom: 4px;
            transition: border-color 0.2s, color 0.2s;
        }
        nav a:hover {
            color: #ff3b00;
            border-bottom-color: #ff3b00;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
        }
        .hamburger span {
            display: block;
            width: 32px;
            height: 4px;
            background: #ffffff;
            border-radius: 0;
        }

        .mobile-nav {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 24px 72px;
            flex-direction: column;
            gap: 24px;
        }
        .mobile-nav.active {
            display: flex;
        }
        .mobile-nav a {
            font-size: 1.4rem;
            text-transform: uppercase;
            color: #ffffff;
            border-bottom: 3px solid transparent;
            padding-bottom: 4px;
        }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            padding: 120px 72px;
            margin-bottom: 120px;
            background: radial-gradient(ellipse at 30% 50%, #ff3b00 0%, #000000 70%);
            border: 4px solid #ff3b00;
            transform: skewY(-1deg);
            overflow: hidden;
        }
        .hero > * {
            transform: skewY(1deg);
        }
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255, 59, 0, 0.05) 20px,
                rgba(255, 59, 0, 0.05) 40px
            );
            pointer-events: none;
        }
        .hero h1 {
            font-size: clamp(3rem, 12vw, 7rem);
            position: relative;
            z-index: 2;
        }
        .hero p {
            font-size: 1.3rem;
            color: #ffffff;
            max-width: 55ch;
            margin-top: 24px;
            position: relative;
            z-index: 2;
        }
        .hero .cta {
            display: inline-block;
            margin-top: 48px;
            padding: 18px 48px;
            background: #ff3b00;
            color: #000000;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 4px solid #ffffff;
            transition: background 0.2s, color 0.2s;
            position: relative;
            z-index: 2;
        }
        .hero .cta:hover {
            background: #ffffff;
            color: #ff3b00;
            border-color: #ff3b00;
        }
        .hero .stats {
            display: flex;
            gap: 72px;
            margin-top: 72px;
            position: relative;
            z-index: 2;
        }
        .hero .stat-item {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }
        .hero .stat-item small {
            display: block;
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.7;
            margin-top: 8px;
            font-family: 'system-ui', sans-serif;
        }

        /* ===== SECTIONS ===== */
        section {
            margin-bottom: 120px;
            padding: 0 72px;
        }

        .section-gap {
            height: 120px;
        }

        /* INTRO */
        .intro-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 72px;
            align-items: start;
        }
        .intro-content .text-block {
            border-left: 4px solid #ff3b00;
            padding-left: 48px;
        }
        .intro-content .visual-block {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border: 4px solid #ff3b00;
            padding: 48px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transform: rotate(1deg);
        }

        /* GALLERY / LOOKBOOK */
        .lookbook-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 48px;
            margin-top: 48px;
        }
        .lookbook-item {
            background: #111111;
            border: 4px solid #ffffff;
            padding: 48px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
            transform: rotate(var(--rot, 0deg));
        }
        .lookbook-item:nth-child(odd) {
            --rot: -1deg;
        }
        .lookbook-item:nth-child(even) {
            --rot: 1.5deg;
        }
        .lookbook-item:hover {
            border-color: #ff3b00;
            transform: rotate(0deg) scale(1.02);
        }
        .lookbook-item .icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        .lookbook-item h3 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .lookbook-item p {
            font-size: 0.95rem;
            color: #aaaaaa;
            max-width: 100%;
        }

        /* REVIEWS */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
        }
        .review-card {
            background: #0a0a0a;
            border: 4px solid #ffffff;
            padding: 48px 32px;
            transform: rotate(var(--rot, 0deg));
            transition: border-color 0.2s, transform 0.2s;
        }
        .review-card:nth-child(1) { --rot: -0.5deg; }
        .review-card:nth-child(2) { --rot: 1deg; }
        .review-card:nth-child(3) { --rot: -1.5deg; }
        .review-card:nth-child(4) { --rot: 0.8deg; }
        .review-card:hover {
            border-color: #ff3b00;
            transform: rotate(0deg);
        }
        .review-card .stars {
            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 16px;
            color: #ff3b00;
        }
        .review-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-family: 'system-ui', sans-serif;
            font-size: 0.9rem;
            color: #888888;
        }
        .review-card .meta strong {
            font-family: 'Impact', 'system-ui', sans-serif;
            font-size: 1.1rem;
            color: #ffffff;
            letter-spacing: 0.05em;
        }
        .review-card blockquote {
            font-family: 'system-ui', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #cccccc;
            border-left: 3px solid #ff3b00;
            padding-left: 20px;
        }

        /* CONTACT / CTA */
        .contact-section {
            background: #111111;
            border: 4px solid #ff3b00;
            padding: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 36px;
            transform: skewY(-0.5deg);
        }
        .contact-section > * {
            transform: skewY(0.5deg);
        }
        .contact-section h2 {
            border-bottom-color: #ffffff;
            margin-bottom: 0;
        }
        .contact-section .phone-link {
            font-size: 3rem;
            font-weight: 700;
            color: #ff3b00;
            border-bottom: 4px solid #ffffff;
            padding-bottom: 8px;
            transition: color 0.2s, border-color 0.2s;
        }
        .contact-section .phone-link:hover {
            color: #ffffff;
            border-bottom-color: #ff3b00;
        }
        .contact-section p {
            max-width: 50ch;
            font-size: 1.2rem;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 4px solid #ff3b00;
            padding: 48px 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }
        footer p {
            font-family: 'system-ui', sans-serif;
            font-size: 0.9rem;
            color: #666666;
            max-width: none;
        }
        footer a {
            font-size: 0.9rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header {
                padding: 16px 24px;
            }
            .container, section {
                padding: 0 24px;
            }
            section {
                margin-bottom: 80px;
            }
            .hero {
                padding: 72px 24px;
                margin-bottom: 80px;
                transform: skewY(-0.5deg);
            }
            .hero > * {
                transform: skewY(0.5deg);
            }
            .hero h1 {
                font-size: clamp(2.2rem, 10vw, 3.5rem);
            }
            .hero .stats {
                flex-direction: column;
                gap: 32px;
            }

            .intro-content {
                grid-template-columns: 1fr;
                gap: 48px;
            }
            .intro-content .text-block {
                border-left-width: 3px;
                padding-left: 24px;
            }
            .intro-content .visual-block {
                min-height: 200px;
                font-size: 3rem;
                padding: 24px;
            }

            .lookbook-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .review-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
            .review-card {
                padding: 32px 24px;
            }

            .contact-section {
                padding: 48px 24px;
            }
            .contact-section .phone-link {
                font-size: 2rem;
            }

            footer {
                padding: 32px 24px;
                flex-direction: column;
                text-align: center;
            }

            nav {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .mobile-nav {
                top: 100%;
                padding: 16px 24px;
            }
        }

        /* small touch: raw css texture via pseudo */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 255, 255, 0.008) 2px,
                rgba(255, 255, 255, 0.008) 4px
            );
        }
    </style>
</head>
<body>
<div class="texture-overlay"></div>

<header>
    <a href="/" class="logo">DC<span>NIGHT</span>LOOK</a>
    <nav>
        <a href="#intro">About</a>
        <a href="#lookbook">Lookbook</
</body>
